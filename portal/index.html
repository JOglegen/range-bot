<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Range Bot — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0E1217;--panel:#151B23;--panel2:#1A222B;--line:#29333E;--text:#E7E3D6;
  --muted:#8C97A4;--faint:#5C6671;--teal:#45B69C;--teal-dim:rgba(69,182,156,.13);
  --amber:#E0A24A;--amber-dim:rgba(224,162,74,.13);--red:#D96A6A;--red-dim:rgba(217,106,106,.13);
  --mono:'IBM Plex Mono',monospace;--disp:'Space Grotesk',sans-serif;--ui:'Inter',sans-serif;}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--text);font-family:var(--ui);font-size:15px;
  line-height:1.5;-webkit-font-smoothing:antialiased;}
body{padding:0 16px 60px}
.wrap{max-width:1000px;margin:0 auto}

/* nav */
nav{display:flex;align-items:center;gap:0;border-bottom:1px solid var(--line);padding:16px 0;margin-bottom:28px}
.logo{font-family:var(--disp);font-weight:700;font-size:20px;color:var(--teal);letter-spacing:-.02em;margin-right:28px}
nav a{font-family:var(--mono);font-size:12px;letter-spacing:.08em;color:var(--muted);
  padding:7px 14px;border-radius:6px;text-decoration:none;text-transform:uppercase}
nav a:hover{color:var(--text);background:var(--panel)}
nav a.active{color:var(--teal);background:var(--teal-dim)}
.refresh{margin-left:auto;background:none;border:1px solid var(--line);color:var(--muted);
  font-family:var(--mono);font-size:11px;padding:6px 12px;border-radius:6px;cursor:pointer}
.refresh:hover{border-color:var(--teal);color:var(--teal)}
.lastseen{font-family:var(--mono);font-size:11px;color:var(--faint);margin-left:10px}

/* metric grid */
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:24px}
.metric{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:16px}
.metric .k{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
.metric .v{font-size:26px;font-weight:600;font-family:var(--mono);margin-top:4px}
.up{color:var(--teal)}.down{color:var(--red)}.neutral{color:var(--text)}

/* section headers */
.sec{font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;
  color:var(--faint);margin:24px 0 10px;border-bottom:1px solid var(--line);padding-bottom:6px}

/* table */
table{width:100%;border-collapse:collapse;background:var(--panel);
  border:1px solid var(--line);border-radius:10px;overflow:hidden;margin-bottom:16px}
th{background:rgba(255,255,255,.03);padding:10px 14px;text-align:left;font-family:var(--mono);
  font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);
  border-bottom:1px solid var(--line)}
td{padding:10px 14px;font-family:var(--mono);font-size:13px;
  border-bottom:1px solid rgba(41,51,62,.5)}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.015)}
.sym{font-weight:600;color:var(--text)}
.pos-pl{color:var(--teal)}.neg-pl{color:var(--red)}

/* order tags */
.tag{display:inline-block;font-family:var(--mono);font-size:10px;font-weight:600;
  letter-spacing:.08em;padding:3px 8px;border-radius:4px;text-transform:uppercase}
.tag-buy{background:var(--teal-dim);color:var(--teal);border:1px solid rgba(69,182,156,.4)}
.tag-sell{background:var(--amber-dim);color:var(--amber);border:1px solid rgba(224,162,74,.4)}
.tag-filled{background:rgba(110,124,138,.1);color:var(--muted);border:1px solid rgba(110,124,138,.3)}
.tag-pending{background:var(--amber-dim);color:var(--amber);border:1px solid rgba(224,162,74,.4)}
.tag-cancelled{background:rgba(110,124,138,.08);color:var(--faint);border:1px solid var(--line)}

/* equity chart */
.chart-box{background:var(--panel);border:1px solid var(--line);border-radius:10px;
  padding:20px;margin-bottom:16px}
canvas{width:100%!important;display:block}

/* empty / loading */
.empty{color:var(--faint);font-family:var(--mono);font-size:13px;
  padding:24px;text-align:center;background:var(--panel);border:1px solid var(--line);
  border-radius:10px}
.spin{display:inline-block;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* latest scan */
.scan-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:2px 0 10px}
.scan-meta{font-family:var(--mono);font-size:11px;color:var(--faint)}
.signals{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin-bottom:18px}
.signal-card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px}
.signal-card.buy{border-color:rgba(69,182,156,.45)}
.signal-card.watch{border-color:rgba(224,162,74,.35)}
.signal-top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px}
.signal-symbol{font-family:var(--disp);font-weight:700;font-size:20px}
.signal-price{font-family:var(--mono);font-size:13px;color:var(--muted)}
.levels{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}
.level{background:var(--bg);border:1px solid var(--line);border-radius:7px;padding:8px}
.level .k{font-family:var(--mono);font-size:9px;color:var(--faint);letter-spacing:.1em;text-transform:uppercase}
.level .v{font-family:var(--mono);font-size:13px;margin-top:2px}
.note{font-size:12px;color:var(--muted);min-height:34px}
</style>
</head>
<body>
<div class="wrap">
  <nav>
    <span class="logo">RangeBot</span>
    <a href="index.html" class="active">Dashboard</a>
    <a href="scanner.html">Scanner</a>
    <button class="refresh" onclick="loadAll()">↻ Refresh</button>
    <span class="lastseen" id="lastseen"></span>
  </nav>

  <!-- metrics -->
  <div class="metrics" id="metrics">
    <div class="metric"><div class="k">Equity</div><div class="v neutral" id="m-equity">—</div></div>
    <div class="metric"><div class="k">Day P&L</div><div class="v neutral" id="m-daypl">—</div></div>
    <div class="metric"><div class="k">Cash</div><div class="v neutral" id="m-cash">—</div></div>
    <div class="metric"><div class="k">Buying Power</div><div class="v neutral" id="m-bp">—</div></div>
    <div class="metric"><div class="k">Open Positions</div><div class="v neutral" id="m-pos">—</div></div>
    <div class="metric"><div class="k">Account Status</div><div class="v neutral" id="m-status">—</div></div>
  </div>

  <!-- latest scanner -->
  <div class="scan-head">
    <div class="sec" style="margin:0;border-bottom:none;padding-bottom:0">Latest 20-day range scan</div>
    <div class="scan-meta" id="scan-meta">Loading scan...</div>
  </div>
  <div id="signals-wrap"><div class="empty"><span class="spin">o</span> Loading signals...</div></div>

  <!-- equity chart -->
  <div class="sec">Portfolio history (30 days)</div>
  <div class="chart-box">
    <canvas id="equityChart" height="120"></canvas>
  </div>

  <!-- positions -->
  <div class="sec">Open positions</div>
  <div id="positions-wrap"><div class="empty"><span class="spin">◌</span> Loading…</div></div>

  <!-- orders -->
  <div class="sec">Recent orders</div>
  <div id="orders-wrap"><div class="empty"><span class="spin">◌</span> Loading…</div></div>
</div>

<script>
const api = (ep) => fetch(`/.netlify/functions/alpaca?endpoint=${ep}`).then(r => r.json());
const $ = id => document.getElementById(id);
const fmt = (n,d=2) => '$' + Number(n).toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d});
const pct = n => (n >= 0 ? '+' : '') + Number(n).toFixed(2) + '%';

function setMetric(id, val, colorfn) {
  const el = $(id); el.textContent = val;
  el.className = 'v ' + (colorfn ? colorfn(val) : 'neutral');
}

async function loadAccount() {
  try {
    const a = await api('account');
    const equity = parseFloat(a.equity), lastEq = parseFloat(a.last_equity || equity);
    const dayPL = equity - lastEq, dayPLpct = lastEq ? (dayPL / lastEq * 100) : 0;
    setMetric('m-equity', fmt(equity), () => 'neutral');
    setMetric('m-daypl', (dayPL >= 0 ? '+' : '') + fmt(dayPL) + ` (${pct(dayPLpct)})`, v => v.startsWith('+') ? 'up' : 'down');
    setMetric('m-cash', fmt(parseFloat(a.cash)), () => 'neutral');
    setMetric('m-bp', fmt(parseFloat(a.buying_power)), () => 'neutral');
    setMetric('m-status', a.status || '—', v => v === 'ACTIVE' ? 'up' : 'neutral');
  } catch(e) { console.error('account:', e); }
}

async function loadPositions() {
  try {
    const pos = await api('positions');
    $('m-pos').textContent = pos.length;
    if (!pos.length) {
      $('positions-wrap').innerHTML = '<div class="empty">No open positions</div>'; return;
    }
    const rows = pos.map(p => {
      const pl = parseFloat(p.unrealized_pl), plpct = parseFloat(p.unrealized_plpc) * 100;
      const cls = pl >= 0 ? 'pos-pl' : 'neg-pl';
      return `<tr>
        <td><span class="sym">${p.symbol}</span></td>
        <td>${p.qty}</td>
        <td>${fmt(parseFloat(p.avg_entry_price))}</td>
        <td>${fmt(parseFloat(p.current_price))}</td>
        <td class="${cls}">${(pl>=0?'+':'')}${fmt(pl)} (${pct(plpct)})</td>
        <td>${fmt(parseFloat(p.market_value))}</td>
      </tr>`;
    }).join('');
    $('positions-wrap').innerHTML = `<table>
      <thead><tr><th>Symbol</th><th>Qty</th><th>Avg Entry</th><th>Current</th><th>Unrealized P&L</th><th>Value</th></tr></thead>
      <tbody>${rows}</tbody></table>`;
  } catch(e) { $('positions-wrap').innerHTML = `<div class="empty">Error: ${e.message}</div>`; }
}

async function loadOrders() {
  try {
    const orders = await api('orders');
    if (!orders.length) {
      $('orders-wrap').innerHTML = '<div class="empty">No recent orders</div>'; return;
    }
    const sideTag = s => s === 'buy'
      ? '<span class="tag tag-buy">Buy</span>'
      : '<span class="tag tag-sell">Sell</span>';
    const statusTag = s => {
      const c = s === 'filled' ? 'filled' : s === 'canceled' ? 'cancelled' : 'pending';
      return `<span class="tag tag-${c}">${s}</span>`;
    };
    const rows = orders.slice(0,20).map(o => {
      const filled = parseFloat(o.filled_avg_price || 0);
      const date = new Date(o.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
      return `<tr>
        <td><span class="sym">${o.symbol}</span></td>
        <td>${sideTag(o.side)}</td>
        <td>${o.qty || o.notional || '—'}</td>
        <td>${o.type}</td>
        <td>${filled ? fmt(filled) : '—'}</td>
        <td>${statusTag(o.status)}</td>
        <td style="color:var(--faint);font-size:12px">${date}</td>
      </tr>`;
    }).join('');
    $('orders-wrap').innerHTML = `<table>
      <thead><tr><th>Symbol</th><th>Side</th><th>Qty</th><th>Type</th><th>Fill Price</th><th>Status</th><th>Time</th></tr></thead>
      <tbody>${rows}</tbody></table>`;
  } catch(e) { $('orders-wrap').innerHTML = `<div class="empty">Error: ${e.message}</div>`; }
}

async function loadPortfolioChart() {
  try {
    const data = await api('portfolio');
    const equity = data.equity || [];
    const timestamps = data.timestamp || [];
    if (!equity.length) return;
    const canvas = $('equityChart');
    const ctx = canvas.getContext('2d');
    canvas.width = canvas.offsetWidth * window.devicePixelRatio;
    canvas.height = 120 * window.devicePixelRatio;
    ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
    const W = canvas.offsetWidth, H = 120;
    const min = Math.min(...equity.filter(Boolean));
    const max = Math.max(...equity.filter(Boolean));
    const range = (max - min) || 1;
    const pad = { t: 10, r: 10, b: 28, l: 70 };
    const plotW = W - pad.l - pad.r, plotH = H - pad.t - pad.b;
    const xScale = i => pad.l + (i / (equity.length - 1)) * plotW;
    const yScale = v => pad.t + plotH - ((v - min) / range) * plotH;

    // background
    ctx.fillStyle = '#151B23'; ctx.fillRect(0, 0, W, H);

    // grid lines
    ctx.strokeStyle = '#29333E'; ctx.lineWidth = 0.5;
    [0, 0.25, 0.5, 0.75, 1].forEach(f => {
      const y = pad.t + f * plotH;
      ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(W - pad.r, y); ctx.stroke();
      const val = max - f * range;
      ctx.fillStyle = '#8C97A4'; ctx.font = '10px IBM Plex Mono';
      ctx.textAlign = 'right';
      ctx.fillText(val >= 1000 ? '$' + (val/1000).toFixed(0) + 'K' : '$' + val.toFixed(0), pad.l - 6, y + 3);
    });

    // area fill
    const grad = ctx.createLinearGradient(0, pad.t, 0, pad.t + plotH);
    grad.addColorStop(0, 'rgba(69,182,156,0.22)');
    grad.addColorStop(1, 'rgba(69,182,156,0.01)');
    ctx.beginPath();
    equity.forEach((v, i) => { if (!v) return; const x = xScale(i), y = yScale(v); i === 0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y); });
    ctx.lineTo(xScale(equity.length - 1), pad.t + plotH);
    ctx.lineTo(xScale(0), pad.t + plotH);
    ctx.closePath(); ctx.fillStyle = grad; ctx.fill();

    // line
    ctx.beginPath(); ctx.strokeStyle = '#45B69C'; ctx.lineWidth = 1.8; ctx.lineJoin = 'round';
    equity.forEach((v, i) => { if (!v) return; const x = xScale(i), y = yScale(v); i === 0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y); });
    ctx.stroke();

    // date labels
    ctx.fillStyle = '#5C6671'; ctx.font = '9px IBM Plex Mono'; ctx.textAlign = 'center';
    [0, Math.floor(equity.length/4), Math.floor(equity.length/2), Math.floor(3*equity.length/4), equity.length-1].forEach(i => {
      if (!timestamps[i]) return;
      const d = new Date(timestamps[i] * 1000);
      ctx.fillText(d.toLocaleDateString('en-US',{month:'short',day:'numeric'}), xScale(i), H - 8);
    });
  } catch(e) { console.warn('chart:', e); }
}

function fmtLevel(n) {
  return n === null || n === undefined ? '-' : fmt(Number(n));
}

function renderSignals(data) {
  const buys = data.buys || [];
  const watches = data.watches || [];
  const rows = [...buys.slice(0, 5), ...watches.slice(0, 3)];
  const scannedAt = data.scanned_at ? new Date(data.scanned_at) : null;
  $('scan-meta').textContent = scannedAt
    ? `${String(data.mode || 'range').toUpperCase()} | ${data.total_scanned || 0} scanned | ${scannedAt.toLocaleString()}`
    : 'Waiting for first scheduled scan';

  if (!rows.length) {
    $('signals-wrap').innerHTML = '<div class="empty">No BUY or WATCH/EXIT signals in the latest scan</div>';
    return;
  }

  $('signals-wrap').innerHTML = `<div class="signals">${rows.map(s => {
    const isBuy = s.signal === 'BUY';
    const entry = s.entry_low && s.entry_high
      ? `${fmtLevel(s.entry_low)}-${fmtLevel(s.entry_high)}`
      : fmtLevel(s.entry_low);
    return `<div class="signal-card ${isBuy ? 'buy' : 'watch'}">
      <div class="signal-top">
        <div>
          <div class="signal-symbol">${s.symbol}</div>
          <div class="signal-price">${fmtLevel(s.price)} | score ${s.score} | pos ${s.pos_pct}%</div>
        </div>
        <span class="tag ${isBuy ? 'tag-buy' : 'tag-pending'}">${s.signal}</span>
      </div>
      <div class="note">${s.note || ''}</div>
      <div class="levels">
        <div class="level"><div class="k">Entry</div><div class="v">${entry}</div></div>
        <div class="level"><div class="k">Target</div><div class="v">${fmtLevel(s.target)}</div></div>
        <div class="level"><div class="k">Stop</div><div class="v">${fmtLevel(s.stop)}</div></div>
      </div>
    </div>`;
  }).join('')}</div>`;
}

async function loadSignals() {
  try {
    const res = await fetch(`data/screener_results.json?ts=${Date.now()}`, { cache: 'no-store' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    renderSignals(await res.json());
  } catch(e) {
    $('signals-wrap').innerHTML = `<div class="empty">Signal data unavailable: ${e.message}</div>`;
    $('scan-meta').textContent = 'No scan file loaded';
  }
}

async function loadAll() {
  $('lastseen').textContent = 'Refreshing…';
  await Promise.all([loadAccount(), loadPositions(), loadOrders(), loadPortfolioChart(), loadSignals()]);
  $('lastseen').textContent = 'Updated ' + new Date().toLocaleTimeString();
}

loadAll();
setInterval(loadAll, 60000); // auto-refresh every 60s
</script>
</body>
</html>
