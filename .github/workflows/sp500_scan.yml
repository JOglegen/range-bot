name: Range Bot - S&P 500 Screener + SMS

on:
  schedule:
    # 20:45 UTC is 3:45 PM Central during daylight time and 2:45 PM during
    # standard time. GitHub schedules are UTC.
    - cron: '45 20 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  screen:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install requests yfinance pandas python-dotenv lxml beautifulsoup4 html5lib

      - name: Run S&P 500 screener + send SMS
        env:
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN:  ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM:        ${{ secrets.TWILIO_FROM }}
          TWILIO_TO:          ${{ secrets.TWILIO_TO }}
        run: python run_screener.py --mode range

      - name: Run monthly dividend income scanner
        env:
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN:  ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM:        ${{ secrets.TWILIO_FROM }}
          TWILIO_TO:          ${{ secrets.TWILIO_TO }}
        run: python run_monthly_income.py --output monthly_income.json

      - name: Run study-list scanner
        env:
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN:  ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM:        ${{ secrets.TWILIO_FROM }}
          TWILIO_TO:          ${{ secrets.TWILIO_TO }}
        run: python run_study_list.py --output study_results.json

      - name: Build action center
        run: python build_action_center.py --screener screener_results.json --income monthly_income.json --study study_results.json --output action_center.json

      - name: Publish latest screener data to portal
        run: |
          mkdir -p portal/data
          cp screener_results.json portal/data/screener_results.json
          cp monthly_income.json portal/data/monthly_income.json
          cp study_results.json portal/data/study_results.json
          cp action_center.json portal/data/action_center.json

      - name: Commit portal screener data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add portal/data/screener_results.json portal/data/monthly_income.json portal/data/study_results.json portal/data/action_center.json
          if git diff --cached --quiet; then
            echo "Portal screener data unchanged."
          else
            git commit -m "Update portal screener data"
            git push
          fi

      - name: Paper trade top BUY signals
        env:
          ALPACA_API_KEY:    ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET: ${{ secrets.ALPACA_API_SECRET }}
        run: python run_from_screener.py --input screener_results.json --broker alpaca_paper --top 5

      - name: Upload screener results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screener-results-${{ github.run_id }}
          path: screener_results.json
          retention-days: 7

      - name: Upload monthly income results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: monthly-income-${{ github.run_id }}
          path: monthly_income.json
          retention-days: 30

      - name: Upload action center results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: action-center-${{ github.run_id }}
          path: action_center.json
          retention-days: 30

      - name: Upload study-list results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: study-list-${{ github.run_id }}
          path: study_results.json
          retention-days: 30

      - name: Run breakout screen
        run: python run_screener.py --mode breakout --dry-run --output screener_breakout.json

      - name: Upload breakout results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screener-breakout-${{ github.run_id }}
          path: screener_breakout.json
          retention-days: 7
