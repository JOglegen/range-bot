name: Range Bot - S&P 500 Screener + SMS

on:
  schedule:
    # Market-hours refreshes while U.S. equities are open.
    # In daylight time this covers 8:30 AM-3:00 PM Central.
    - cron: '30,45 13 * * 1-5'
    - cron: '*/15 14-19 * * 1-5'
    - cron: '0 20 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  screen:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install requests yfinance pandas python-dotenv lxml beautifulsoup4 html5lib

      - name: Run S&P 500 screener + send SMS
        env:
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN:  ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM:        ${{ secrets.TWILIO_FROM }}
          TWILIO_TO:          ${{ secrets.TWILIO_TO }}
        run: python run_screener.py --mode range

      - name: Run monthly dividend income scanner
        env:
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN:  ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM:        ${{ secrets.TWILIO_FROM }}
          TWILIO_TO:          ${{ secrets.TWILIO_TO }}
        run: python run_monthly_income.py --output monthly_income.json

      - name: Run study-list scanner
        env:
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN:  ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM:        ${{ secrets.TWILIO_FROM }}
          TWILIO_TO:          ${{ secrets.TWILIO_TO }}
        run: python run_study_list.py --output study_results.json

      - name: Build action center
        run: python build_action_center.py --screener screener_results.json --income monthly_income.json --study study_results.json --output action_center.json

      - name: Update $1000 paper challenge
        run: |
          cp portal/data/paper_challenge.json paper_challenge_state.json
          python run_paper_challenge.py --screener screener_results.json --state paper_challenge_state.json --output paper_challenge.json

      - name: Publish latest screener data to portal
        run: |
          mkdir -p portal/data
          cp screener_results.json portal/data/screener_results.json
          cp monthly_income.json portal/data/monthly_income.json
          cp study_results.json portal/data/study_results.json
          cp action_center.json portal/data/action_center.json
          cp paper_challenge.json portal/data/paper_challenge.json

      - name: Commit portal screener data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add portal/data/screener_results.json portal/data/monthly_income.json portal/data/study_results.json portal/data/action_center.json portal/data/paper_challenge.json
          if git diff --cached --quiet; then
            echo "Portal screener data unchanged."
          else
            git commit -m "Update portal screener data"
            git push
          fi

      - name: Deploy updated portal to Netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        run: |
          python3 - << 'PYEOF'
          import json, os, requests, subprocess
          from datetime import datetime, timezone

          token = os.environ["NETLIFY_AUTH_TOKEN"]
          headers = {"Authorization": f"Bearer {token}", "Content-Type": "application/json"}
          sites = requests.get("https://api.netlify.com/api/v1/sites?per_page=100", headers=headers, timeout=30).json()
          matches = [site for site in sites if "range-bot-portal" in site.get("name", "")]
          if not matches:
              raise SystemExit("Could not find Netlify site named range-bot-portal")

          site = matches[0]
          payload = {
              "version": f"scan-{os.environ['GITHUB_RUN_NUMBER']}",
              "run_id": os.environ["GITHUB_RUN_ID"],
              "run_number": os.environ["GITHUB_RUN_NUMBER"],
              "commit": os.environ["GITHUB_SHA"],
              "short_commit": os.environ["GITHUB_SHA"][:7],
              "branch": os.environ["GITHUB_REF_NAME"],
              "deployed_at": datetime.now(timezone.utc).isoformat(timespec="seconds").replace("+00:00", "Z"),
          }
          os.makedirs("portal/data", exist_ok=True)
          with open("portal/data/version.json", "w", encoding="utf-8") as f:
              json.dump(payload, f, indent=2)
              f.write("\n")

          subprocess.run(["npm", "install", "-g", "netlify-cli"], check=True)
          subprocess.run([
              "netlify", "deploy",
              "--prod",
              "--dir=portal",
              "--functions=portal/netlify/functions",
              f"--auth={token}",
              f"--site={site['id']}",
              f"--message=Scanner deploy {payload['version']}",
          ], check=True)
          print(f"Portal live at {site.get('ssl_url') or site.get('url')}")
          PYEOF

      - name: Paper trade top BUY signals
        env:
          ALPACA_API_KEY:    ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET: ${{ secrets.ALPACA_API_SECRET }}
        run: python run_from_screener.py --input screener_results.json --broker alpaca_paper --top 5

      - name: Upload screener results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screener-results-${{ github.run_id }}
          path: screener_results.json
          retention-days: 7

      - name: Upload monthly income results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: monthly-income-${{ github.run_id }}
          path: monthly_income.json
          retention-days: 30

      - name: Upload action center results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: action-center-${{ github.run_id }}
          path: action_center.json
          retention-days: 30

      - name: Upload study-list results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: study-list-${{ github.run_id }}
          path: study_results.json
          retention-days: 30

      - name: Upload paper challenge
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: paper-challenge-${{ github.run_id }}
          path: paper_challenge.json
          retention-days: 30

      - name: Run breakout screen
        run: python run_screener.py --mode breakout --dry-run --output screener_breakout.json

      - name: Upload breakout results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screener-breakout-${{ github.run_id }}
          path: screener_breakout.json
          retention-days: 7
