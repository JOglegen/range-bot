name: Range Bot - Manual Watchlist Dry Run

on:
  workflow_dispatch:

jobs:
  dry-run:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Verify Alpaca paper connection
        env:
          ALPACA_API_KEY:    ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET: ${{ secrets.ALPACA_API_SECRET }}
        run: |
          python3 -c "
          import os, requests
          key = os.environ.get('ALPACA_API_KEY', '')
          sec = os.environ.get('ALPACA_API_SECRET', '')
          if not key or not sec:
              raise SystemExit('Missing ALPACA_API_KEY / ALPACA_API_SECRET')
          headers = {'APCA-API-KEY-ID': key, 'APCA-API-SECRET-KEY': sec}
          r = requests.get('https://paper-api.alpaca.markets/v2/account', headers=headers, timeout=15)
          print('Status:', r.status_code)
          if not r.ok:
              print(r.text)
              raise SystemExit('Connection failed')
          d = r.json()
          print('Account status:', d.get('status'))
          print('Equity:', d.get('equity'))
          "

      - name: Dry-run configured watchlist
        env:
          ALPACA_API_KEY:    ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET: ${{ secrets.ALPACA_API_SECRET }}
        run: python runner.py --broker alpaca_paper --dry-run
