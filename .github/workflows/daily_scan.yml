name: Range Bot — Daily Scan

on:
  schedule:
    # 3:50 PM Central Time = 20:50 UTC (CST) / 21:50 UTC (CDT)
    # Runs Mon–Fri. Strategy signal fires at the close (4 PM ET),
    # we want to be in position to act a few minutes before that.
    - cron: '50 20 * * 1-5'
  workflow_dispatch:   # also lets you trigger it manually from GitHub

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Run range bot (Alpaca paper)
        env:
          ALPACA_API_KEY:    ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET: ${{ secrets.ALPACA_API_SECRET }}
        run: python runner.py --broker alpaca_paper

      # ── Optional: flip to live with Schwab when you're ready ──────────────
      # To go live, comment out the paper step above and uncomment this one.
      # Also add SCHWAB_* secrets in repo Settings → Secrets and variables.
      #
      # - name: Run range bot (Schwab LIVE)
      #   env:
      #     SCHWAB_APP_KEY:        ${{ secrets.SCHWAB_APP_KEY }}
      #     SCHWAB_APP_SECRET:     ${{ secrets.SCHWAB_APP_SECRET }}
      #     SCHWAB_REFRESH_TOKEN:  ${{ secrets.SCHWAB_REFRESH_TOKEN }}
      #     SCHWAB_ACCOUNT_HASH:   ${{ secrets.SCHWAB_ACCOUNT_HASH }}
      #   run: python runner.py --broker schwab --i-understand-live
