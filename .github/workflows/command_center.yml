name: Ogle Command Center — Daily Scan

on:
  schedule:
    # 4:15 PM Central = 21:15 UTC — after equity close, ag futures settled
    - cron: '15 21 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install requests yfinance pandas

      - name: Run multi-asset consensus scan
        run: python run_command_center.py

      - name: Commit market_scores.json (triggers portal redeploy)
        run: |
          git config user.name "ogle-command-center[bot]"
          git config user.email "bot@recordharvest.com"
          git add portal/market_scores.json
          if git diff --cached --quiet; then
            echo "No score changes to commit."
          else
            git commit -m "Command Center: daily market scores $(date -u +%Y-%m-%d)"
            git push
          fi
