name: Deploy Portal to Netlify

on:
  push:
    paths: ['portal/**']
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Create or find Netlify site
        id: site
        env:
          NETLIFY_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        run: |
          python3 - << 'PYEOF'
          import json, os, requests, sys
          TOKEN = os.environ["NETLIFY_TOKEN"]
          h = {"Authorization": f"Bearer {TOKEN}", "Content-Type": "application/json"}

          # Try creating a new site
          r = requests.post("https://api.netlify.com/api/v1/sites",
                            headers=h, json={"name": "range-bot-portal"})
          if r.ok:
              site = r.json()
          else:
              # Site name taken — find existing
              sites = requests.get("https://api.netlify.com/api/v1/sites?per_page=100", headers=h).json()
              matches = [s for s in sites if "range-bot" in s.get("name","")]
              if not matches:
                  print("ERROR: could not create or find site"); sys.exit(1)
              site = matches[0]

          site_id  = site["id"]
          site_url = site.get("ssl_url") or site.get("url","")
          print(f"Site ID : {site_id}")
          print(f"Site URL: {site_url}")

          # Write to GITHUB_OUTPUT
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"site_id={site_id}\n")
              f.write(f"site_url={site_url}\n")
          PYEOF

      - name: Set Alpaca env vars on Netlify site
        env:
          NETLIFY_TOKEN:     ${{ secrets.NETLIFY_AUTH_TOKEN }}
          ALPACA_API_KEY:    ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET: ${{ secrets.ALPACA_API_SECRET }}
          SITE_ID:           ${{ steps.site.outputs.site_id }}
        run: |
          python3 - << 'PYEOF'
          import json, os, requests
          TOKEN  = os.environ["NETLIFY_TOKEN"]
          SITE   = os.environ["SITE_ID"]
          KEY    = os.environ["ALPACA_API_KEY"]
          SECRET = os.environ["ALPACA_API_SECRET"]
          h = {"Authorization": f"Bearer {TOKEN}", "Content-Type": "application/json"}
          payload = {"build_settings": {"env": {
              "ALPACA_API_KEY":    KEY,
              "ALPACA_API_SECRET": SECRET,
          }}}
          r = requests.patch(f"https://api.netlify.com/api/v1/sites/{SITE}",
                             headers=h, json=payload)
          print("Env vars:", r.status_code, "OK" if r.ok else r.text[:120])
          PYEOF

      - name: Zip portal and deploy
        env:
          NETLIFY_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          SITE_ID:       ${{ steps.site.outputs.site_id }}
          SITE_URL:      ${{ steps.site.outputs.site_url }}
        run: |
          cd portal && zip -r ../portal.zip . -x "*.DS_Store" && cd ..
          python3 - << 'PYEOF'
          import json, os, requests
          TOKEN   = os.environ["NETLIFY_TOKEN"]
          SITE    = os.environ["SITE_ID"]
          SITE_URL= os.environ["SITE_URL"]
          h = {"Authorization": f"Bearer {TOKEN}", "Content-Type": "application/zip"}
          with open("portal.zip","rb") as f:
              data = f.read()
          r = requests.post(f"https://api.netlify.com/api/v1/sites/{SITE}/deploys",
                            headers=h, data=data)
          d = r.json()
          deploy_url = d.get("deploy_ssl_url") or d.get("ssl_url") or SITE_URL
          print(f"\n✅  Portal live at: {deploy_url}")
          print(f"   Dashboard : {deploy_url}/index.html")
          print(f"   Scanner   : {deploy_url}/scanner.html")
          if not r.ok:
              print("Deploy error:", r.text[:200])
          PYEOF
