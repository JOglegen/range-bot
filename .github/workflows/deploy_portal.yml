name: Deploy Portal to Netlify

on:
  push:
    paths: ['portal/**']
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Install Netlify CLI
        run: npm install -g netlify-cli

      - name: Create or find Netlify site ID
        id: site
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        run: |
          python3 - << 'PYEOF'
          import json, os, requests, sys

          TOKEN = os.environ["NETLIFY_AUTH_TOKEN"]
          h = {"Authorization": f"Bearer {TOKEN}", "Content-Type": "application/json"}

          # Check if site already exists
          sites = requests.get("https://api.netlify.com/api/v1/sites?per_page=100", headers=h).json()
          match = [s for s in sites if "range-bot-portal" in s.get("name", "")]

          if match:
              site = match[0]
              print(f"Found existing site: {site['name']}")
          else:
              site = requests.post("https://api.netlify.com/api/v1/sites",
                                   headers=h, json={"name": "range-bot-portal"}).json()
              print(f"Created new site: {site.get('name')}")

          site_id  = site["id"]
          site_url = site.get("ssl_url") or site.get("url", "")
          print(f"Site ID:  {site_id}")
          print(f"Site URL: {site_url}")

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"site_id={site_id}\n")
              f.write(f"site_url={site_url}\n")
          PYEOF

      - name: Set Alpaca env vars on Netlify site
        env:
          NETLIFY_AUTH_TOKEN:  ${{ secrets.NETLIFY_AUTH_TOKEN }}
          ALPACA_API_KEY:      ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET:   ${{ secrets.ALPACA_API_SECRET }}
          SITE_ID:             ${{ steps.site.outputs.site_id }}
        run: |
          python3 - << 'PYEOF'
          import json, os, requests
          h = {"Authorization": f"Bearer {os.environ['NETLIFY_AUTH_TOKEN']}",
               "Content-Type": "application/json"}
          r = requests.patch(
              f"https://api.netlify.com/api/v1/sites/{os.environ['SITE_ID']}",
              headers=h,
              json={"build_settings": {"env": {
                  "ALPACA_API_KEY":    os.environ["ALPACA_API_KEY"],
                  "ALPACA_API_SECRET": os.environ["ALPACA_API_SECRET"],
              }}})
          print("Env vars:", "✓" if r.ok else f"✗ {r.text[:100]}")
          PYEOF

      - name: Deploy portal (static + functions) via Netlify CLI
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID:    ${{ steps.site.outputs.site_id }}
        run: |
          netlify deploy \
            --prod \
            --dir=portal \
            --functions=portal/netlify/functions \
            --auth=$NETLIFY_AUTH_TOKEN \
            --site=$NETLIFY_SITE_ID \
            --message="Deploy from GitHub Actions $(date -u +%Y-%m-%dT%H:%M)"

      - name: Print live URL
        env:
          SITE_URL: ${{ steps.site.outputs.site_url }}
        run: |
          echo ""
          echo "✅ Portal live at: $SITE_URL"
          echo "   Dashboard : $SITE_URL/index.html"
          echo "   Scanner   : $SITE_URL/scanner.html"
